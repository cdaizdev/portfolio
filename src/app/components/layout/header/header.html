<header class="bg-gray-900 shadow-md">
  <div class="mx-auto max-w-7xl px-4 md:px-12 py-6 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-orange-600 dark:text-orange-400">
        <a routerLink="/">
          <span>Inicio</span>
        </a>
      </h1>
      <h2 class="inline-flex gap-2">
        <small class="text-zinc-300 text-xs">Built with Angular</small>
        <svg xmlns="http://www.w3.org/2000/svg" height="20" width="20" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L3 7L5 24L16 30L27 24L29 7L16 2Z" fill="#DD0031" />
          <path d="M16 2V30L27 24L29 7L16 2Z" fill="#C3002F" />
          <path
            d="M15.9998 5.09375L7.87305 23.3638H10.9031L12.5368 19.2757H19.4348L21.0685 23.3638H24.0986L15.9998 5.09375ZM18.3736 16.7557H13.626L15.9998 11.0298L18.3736 16.7557Z"
            fill="white" />
        </svg>
      </h2>
    </div>
    <button (click)="toggleMobileMenu()" class="md:hidden text-gray-600 dark:text-gray-300 text-2xl focus:outline-none">
      @if (!isMobileMenuOpen) {
      <span>☰</span>
      }
      @if (isMobileMenuOpen) {
      <span>✖</span>
      }
    </button>

    <nav id="navMenu" class="hidden md:flex gap-6">
      <a routerLink="/"
        class="text-gray-200 font-medium relative inline-block pb-1 group no-underline hover:text-orange-300 transition duration-300">
        Inicio
        <span
          class="absolute bottom-0 left-0 w-full h-0.5 bg-orange-500 scale-x-0 origin-left transition-transform duration-300 ease-out group-hover:scale-x-100"></span>
      </a>
      <a href="#about"
        class="text-gray-200 font-medium relative inline-block pb-1 group no-underline hover:text-orange-300 transition duration-300">
        Acerca de
        <span
          class="absolute bottom-0 left-0 w-full h-0.5 bg-orange-500 scale-x-0 origin-left transition-transform duration-300 ease-out group-hover:scale-x-100"></span>
      </a>
      <a href="#blog"
        class="text-gray-200 font-medium relative inline-block pb-1 group no-underline hover:text-orange-300 transition duration-300">
        Blog
        <span
          class="absolute bottom-0 left-0 w-full h-0.5 bg-orange-500 scale-x-0 origin-left transition-transform duration-300 ease-out group-hover:scale-x-100"></span>
      </a>
    </nav>
  </div>

  <div class="mobile-menu" [ngClass]="{'visible': isMobileMenuOpen}">
    <a routerLink="/" (click)="toggleMobileMenu()"
      class="block nav-item text-gray-600 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 p-2">Inicio</a>
    <a href="#about" (click)="toggleMobileMenu()"
      class="block nav-item text-gray-600 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 p-2">
      Acerca de
    </a>
    <a href="#blog" (click)="toggleMobileMenu()"
      class="block nav-item text-gray-600 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 p-2">Blog</a>
  </div>

</header>
